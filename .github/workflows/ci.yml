name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: blacksmith-6vcpu-macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          cache: true
          cache_key_prefix: mise-ci-${{ github.event_name == 'pull_request' && 'pr' || github.ref_name }}
          version: 2026.4.5

      - name: Install tools
        run: mise install

      - name: Format check
        run: mise run fmt-check

      - name: Test
        run: mise run test

      - name: Build release
        run: mise run build-release

      - name: Release config check
        run: mise run release-check
